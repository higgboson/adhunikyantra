name: adhunik_yantra
description: Smart Home Electrical Fault Detection & Energy Management IoT System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_database: ^10.4.0
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.10
  
  # State Management & Navigation
  flutter_riverpod: ^2.4.9
  go_router: ^13.0.1
  
  # Charts & UI
  fl_chart: ^0.66.0
  google_fonts: ^6.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Utils
  intl: ^0.19.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
